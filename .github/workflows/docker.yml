name: Build Frontend Docker

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: medcore-his-frontend

jobs:
  docker:
    runs-on: ubuntu-latest

    env:
      PUBLIC_API_URL: https://medcore-his-api-latest.onrender.com

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            PUBLIC_API_URL=https://medcore-his-api-latest.onrender.com
          tags: |
            ghcr.io/${{ github.repository_owner }}/medcore-his-frontend:latest
            ghcr.io/${{ github.repository_owner }}/medcore-his-frontend:${{ github.sha }}
