name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create env file
        run: echo "PUBLIC_API_URL=https://medcore-his-api-latest.onrender.com" > .env

      - name: Format and lint
        run: npm run lint

      - name: Svelte check
        run: npm run check

      - name: Build
        run: npm run build
